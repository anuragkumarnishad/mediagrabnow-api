services:
  - type: web
    name: mediagrabnow-api
    runtime: python
    buildCommand: "pip install --upgrade pip && pip install fastapi==0.109.2 'uvicorn[standard]==0.27.1' aiofiles==23.2.1 python-multipart==0.0.9 httpx==0.27.0 pydantic==2.6.4 yt-dlp"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
